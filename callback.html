<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Etsy OAuth Callback</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    .container {
      max-width: 760px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
    }
    code {
      display: block;
      white-space: pre-wrap;
      word-break: break-all;
      background: #f0f0f0;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Etsy OAuth callback received</h1>
    <p>If you see this page after Etsy login, the redirect worked.</p>
    <ol>
      <li>Copy the full URL from your browser address bar.</li>
      <li>Paste it into the Etsy Auto Downloader popup window.</li>
    </ol>
    <button onclick="navigator.clipboard.writeText(window.location.href)">Copy current URL</button>
    <code id="url"></code>
  </main>
  <script>
    document.getElementById('url').textContent = window.location.href;
  </script>
</body>
</html>
